<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The Owiah family archive — photographs and films celebrating Mr. Owiah." />
    <meta name="theme-color" content="#eee7d7" />
    <title>The Owiah Family Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="gallery-page">
    <svg class="feather-sprite" aria-hidden="true">
      <symbol id="icon-heart" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"></path></symbol>
      <symbol id="icon-arrow-down" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></symbol>
      <symbol id="icon-arrow-up" viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></symbol>
      <symbol id="icon-arrow-left" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></symbol>
      <symbol id="icon-external-link" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></symbol>
      <symbol id="icon-corner-down-right" viewBox="0 0 24 24"><polyline points="15 10 20 15 15 20"></polyline><path d="M4 4v7a4 4 0 0 0 4 4h12"></path></symbol>
      <symbol id="icon-x" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></symbol>
      <symbol id="icon-star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></symbol>
      <symbol id="icon-music" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></symbol>
      <symbol id="icon-play" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></symbol>
      <symbol id="icon-volume-2" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></symbol>
      <symbol id="icon-volume-x" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></symbol>
    </svg>
    <nav class="gallery-nav" aria-label="Gallery navigation">
      <div class="gallery-nav__links">
        <a href="index.html">Home</a>
        <a href="index.html#messages">The letters</a>
      </div>
    </nav>

    <aside class="music-bar is-visible" id="musicBar" aria-label="Soundtrack controls" aria-hidden="false">
      <div class="music-bar__art" aria-hidden="true"><svg class="feather-icon"><use href="#icon-music"></use></svg></div>
      <div class="music-bar__track"><strong>Gratitude</strong><span>Asake</span></div>
      <button class="music-bar__control music-bar__play" id="musicToggle" type="button" aria-label="Play soundtrack">
        <svg class="feather-icon" aria-hidden="true"><use id="musicToggleIcon" href="#icon-play"></use></svg>
      </button>
      <div class="music-bar__timeline">
        <input id="musicProgress" type="range" min="0" max="100" value="0" step="0.1" aria-label="Seek soundtrack" />
        <div class="music-bar__time"><span id="musicCurrentTime">0:00</span><span id="musicDuration">2:50</span></div>
      </div>
      <button class="music-bar__control" id="musicMute" type="button" aria-label="Mute soundtrack">
        <svg class="feather-icon" aria-hidden="true"><use id="musicMuteIcon" href="#icon-volume-2"></use></svg>
      </button>
    </aside>
    <audio id="soundtrackAudio" src="asake-asake-gratitude-official-visualizer.m4a" preload="auto" autoplay loop></audio>

    <main>
      <section class="portrait-section archive" id="archive" aria-label="The Owiah family archive">
        <header class="archive__header reveal is-visible">
          <div>
            <h2>A life held in<br /><em>the people he loves.</em></h2>
          </div>
          <div class="archive__index" aria-label="Archive information">
            <span>Family / Faith / Legacy</span>
            <strong>ACCRA, GH</strong>
            <small>VOL. 01 — 2026</small>
          </div>
        </header>

        <div class="archive-lead reveal">
          <figure class="archive-lead__hero">
            <img src="assets/WhatsApp Image 2026-06-21 at 15.45.49.jpeg" alt="The Owiah family celebrating together" fetchpriority="high" />
            <figcaption>
              <span>PLATE 001</span>
              <p>The Owiah Family<br />Accra, Ghana</p>
            </figcaption>
          </figure>
          <div class="archive-lead__column">
            <figure class="archive-lead__portrait">
              <img src="assets/WhatsApp Image 2026-06-21 at 15.42.19.jpeg" alt="Mr. Owiah surrounded by his family" loading="lazy" />
              <figcaption>Family portrait <span>Plate 002</span></figcaption>
            </figure>
            <figure class="archive-lead__portrait archive-lead__portrait--wide">
              <img src="assets/WhatsApp Image 2026-06-21 at 15.42.47.jpeg" alt="The family celebrating a graduation together" loading="lazy" />
              <figcaption>Graduation day <span>Plate 003</span></figcaption>
            </figure>
          </div>
        </div>

        <div class="archive-statement reveal" aria-label="Family values">
          <span>Family</span><i>—</i><span>Faith</span><i>—</i><span>Legacy</span>
        </div>

        <div class="archive-contact reveal">
          <div class="archive-contact__header">
            <p>Selected photographs</p>
            <p id="archiveStatus">Twelve photographs on view</p>
          </div>
          <div class="archive-grid" id="memoryReel" aria-label="More family photographs"></div>
          <button class="archive-toggle" id="archiveToggle" type="button" aria-expanded="false">
            <span>Enter the full archive</span>
            <svg class="feather-icon" aria-hidden="true"><use href="#icon-corner-down-right"></use></svg>
          </button>
        </div>

        <section class="motion-archive reveal" aria-labelledby="motionTitle">
          <header class="motion-archive__header">
            <p>Motion archive <span>03 films</span></p>
            <h3 id="motionTitle">The moments between<br />the photographs.</h3>
          </header>
          <div class="video-grid">
            <figure class="video-card">
              <video controls playsinline preload="metadata" poster="assets/family call.jpeg" aria-label="Family film one">
                <source src="assets/WhatsApp Video 2026-06-21 at 15.46.18.mp4" type="video/mp4" />
                Your browser does not support the video element.
              </video>
              <figcaption><span>FILM 01</span> A moment to remember</figcaption>
            </figure>
            <figure class="video-card">
              <video controls playsinline preload="metadata" poster="assets/WhatsApp Image 2026-06-21 at 15.46.22.jpeg" aria-label="Family film two">
                <source src="assets/WhatsApp Video 2026-06-21 at 15.46.21.mp4" type="video/mp4" />
                Your browser does not support the video element.
              </video>
              <figcaption><span>FILM 02</span> One for the family album</figcaption>
            </figure>
            <figure class="video-card">
              <video controls playsinline preload="metadata" poster="assets/WhatsApp Image 2026-06-21 at 15.46.24.jpeg" aria-label="Family film three">
                <source src="assets/WhatsApp Video 2026-06-21 at 15.46.23.mp4" type="video/mp4" />
                Your browser does not support the video element.
              </video>
              <figcaption><span>FILM 03</span> Love, laughter, and Dad</figcaption>
            </figure>
          </div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <a href="index.html"><svg class="feather-icon" aria-hidden="true"><use href="#icon-arrow-left"></use></svg> Return to the tribute</a>
    </footer>

    <dialog class="lightbox" id="photoLightbox" aria-label="Enlarged family photograph">
      <button class="lightbox__close" id="lightboxClose" type="button" aria-label="Close photograph"><svg class="feather-icon" aria-hidden="true"><use href="#icon-x"></use></svg></button>
      <img id="lightboxImage" src="" alt="" />
      <p id="lightboxCaption"></p>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
