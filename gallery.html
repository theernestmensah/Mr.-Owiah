<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The Owiah family archive — photographs and films celebrating Mr. Owiah." />
    <meta name="theme-color" content="#eee7d7" />
    <title>The Owiah Family Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="gallery-page">
    <nav class="gallery-nav" aria-label="Gallery navigation">
      <div class="gallery-nav__links">
        <a href="index.html">Home</a>
        <a href="index.html#messages">The letters</a>
      </div>
    </nav>

    <main>
      <section class="portrait-section archive" id="archive" aria-label="The Owiah family archive">
        <header class="archive__header reveal is-visible">
          <div>
            <h2>A life held in<br /><em>the people he loves.</em></h2>
          </div>
          <div class="archive__index" aria-label="Archive information">
            <span>Family / Faith / Legacy</span>
            <strong>ACCRA, GH</strong>
            <small>VOL. 01 — 2026</small>
          </div>
        </header>

        <div class="archive-lead reveal">
          <figure class="archive-lead__hero">
            <img src="assets/WhatsApp Image 2026-06-21 at 15.45.49.jpeg" alt="The Owiah family celebrating together" fetchpriority="high" />
            <figcaption>
              <span>PLATE 001</span>
              <p>The Owiah Family<br />Accra, Ghana</p>
            </figcaption>
          </figure>
          <div class="archive-lead__column">
            <figure class="archive-lead__portrait">
              <img src="assets/WhatsApp Image 2026-06-21 at 15.42.19.jpeg" alt="Mr. Owiah surrounded by his family" loading="lazy" />
              <figcaption>Family portrait <span>Plate 002</span></figcaption>
            </figure>
            <figure class="archive-lead__portrait archive-lead__portrait--wide">
              <img src="assets/WhatsApp Image 2026-06-21 at 15.42.47.jpeg" alt="The family celebrating a graduation together" loading="lazy" />
              <figcaption>Graduation day <span>Plate 003</span></figcaption>
            </figure>
          </div>
        </div>

        <div class="archive-statement reveal" aria-label="Family values">
          <span>Family</span><i>—</i><span>Faith</span><i>—</i><span>Legacy</span>
        </div>

        <div class="archive-contact reveal">
          <div class="archive-contact__header">
            <p>Selected photographs</p>
            <p id="archiveStatus">Twelve photographs on view</p>
          </div>
          <div class="archive-grid" id="memoryReel" aria-label="More family photographs"></div>
          <button class="archive-toggle" id="archiveToggle" type="button" aria-expanded="false">
            <span>Enter the full archive</span>
            <span aria-hidden="true">↘</span>
          </button>
        </div>

        <section class="motion-archive reveal" aria-labelledby="motionTitle">
          <header class="motion-archive__header">
            <p>Motion archive <span>03 films</span></p>
            <h3 id="motionTitle">The moments between<br />the photographs.</h3>
          </header>
          <div class="video-grid">
            <figure class="video-card">
              <video controls playsinline preload="metadata" poster="assets/family call.jpeg" aria-label="Family film one">
                <source src="assets/WhatsApp Video 2026-06-21 at 15.46.18.mp4" type="video/mp4" />
                Your browser does not support the video element.
              </video>
              <figcaption><span>FILM 01</span> A moment to remember</figcaption>
            </figure>
            <figure class="video-card">
              <video controls playsinline preload="metadata" poster="assets/WhatsApp Image 2026-06-21 at 15.46.22.jpeg" aria-label="Family film two">
                <source src="assets/WhatsApp Video 2026-06-21 at 15.46.21.mp4" type="video/mp4" />
                Your browser does not support the video element.
              </video>
              <figcaption><span>FILM 02</span> One for the family album</figcaption>
            </figure>
            <figure class="video-card">
              <video controls playsinline preload="metadata" poster="assets/WhatsApp Image 2026-06-21 at 15.46.24.jpeg" aria-label="Family film three">
                <source src="assets/WhatsApp Video 2026-06-21 at 15.46.23.mp4" type="video/mp4" />
                Your browser does not support the video element.
              </video>
              <figcaption><span>FILM 03</span> Love, laughter, and Dad</figcaption>
            </figure>
          </div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <a href="index.html">Return to the tribute ↑</a>
    </footer>

    <dialog class="lightbox" id="photoLightbox" aria-label="Enlarged family photograph">
      <button class="lightbox__close" id="lightboxClose" type="button" aria-label="Close photograph">×</button>
      <img id="lightboxImage" src="" alt="" />
      <p id="lightboxCaption"></p>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
